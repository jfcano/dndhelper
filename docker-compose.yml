services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dndhelper
      POSTGRES_PASSWORD: dndhelper
      POSTGRES_DB: dndhelper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dndhelper -d dndhelper"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: yanferstime/dndhelper-backend:${DNDHELPER_IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql+psycopg://dndhelper:dndhelper@db:5432/dndhelper
      EMBEDDINGS_DEVICE: cpu
      # Si no se define SETUP_MASTER_PASSWORD, el entrypoint del backend la genera aleatoria y la muestra en logs.
      SETUP_MASTER_PASSWORD: ${SETUP_MASTER_PASSWORD:-}
      # El servicio «ingest-worker» ya indexa la cola; evitar un segundo worker dentro del contenedor del API.
      INGEST_WORKER_AUTOSTART: "false"
    volumes:
      - app_data:/app/backend/data
      - app_storage:/app/backend/storage
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy

  ingest-worker:
    image: yanferstime/dndhelper-backend:${DNDHELPER_IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql+psycopg://dndhelper:dndhelper@db:5432/dndhelper
      EMBEDDINGS_DEVICE: cpu
      INGEST_WORKER_AUTOSTART: "false"
      SETUP_MASTER_PASSWORD: ${SETUP_MASTER_PASSWORD:-}
    volumes:
      - app_data:/app/backend/data
      - app_storage:/app/backend/storage
    entrypoint: ["/usr/local/bin/docker-entrypoint-worker.sh"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: yanferstime/dndhelper-frontend:${DNDHELPER_IMAGE_TAG:-latest}
    environment:
      BACKEND_UPSTREAM: backend:8000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # pytest (misma imagen que backend). No arranca con `docker compose up`; usa perfil «test».
  # Ej.: docker compose --profile test run --rm test
  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_DEV: "true"
    env_file:
      - .env
    environment:
      POSTGRES_TEST_URL: postgresql+psycopg://dndhelper:dndhelper@db:5432/dndhelper_test
      POSTGRES_URL: postgresql+psycopg://dndhelper:dndhelper@db:5432/dndhelper_test
      EMBEDDINGS_DEVICE: cpu
      INGEST_WORKER_AUTOSTART: "false"
      # Alineado con backend/tests/conftest.py (bootstrap /api/setup en tests)
      SETUP_MASTER_PASSWORD: pytest_integration_setup_master
    volumes:
      - app_data:/app/backend/data
      - app_storage:/app/backend/storage
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    entrypoint: ["/app/scripts/docker-test-entrypoint.sh"]
    command: ["backend/tests", "-q"]

  # Playwright E2E (imagen oficial con Chromium). Perfil «e2e»; usa nginx+frontend y proxy /api → backend.
  # Ej.: docker compose --profile e2e up -d db backend frontend && docker compose --profile e2e run --rm e2e
  e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    image: yanferstime/dndhelper-e2e:${DNDHELPER_IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:80
      PLAYWRIGHT_DOCKER: "1"
      CI: "1"
      E2E_BACKEND_STORAGE_DIR: /backend/storage
      # Clave de bootstrap para entorno de pruebas E2E (no usar en producción).
      E2E_SETUP_MASTER_PASSWORD: pytest_integration_setup_master
    working_dir: /work
    volumes:
      # Misma ruta que resuelve e2e/helpers writeWorldImageFile → /backend/storage/... (debe coincidir con backend:/app/backend/storage)
      - app_storage:/backend/storage
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    entrypoint: ["/bin/bash", "/work/docker-e2e-entrypoint.sh"]

volumes:
  postgres_data:
  app_data:
  app_storage:
