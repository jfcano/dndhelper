services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dndhelper
      POSTGRES_PASSWORD: dndhelper
      POSTGRES_DB: dndhelper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dndhelper -d dndhelper"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql+psycopg://dndhelper:dndhelper@db:5432/dndhelper
      EMBEDDINGS_DEVICE: cpu
      # Instalación inicial por UI si no defines ADMIN_* en .env (cámbiala en producción).
      SETUP_MASTER_PASSWORD: ${SETUP_MASTER_PASSWORD:-local-dev-setup-master}
      # El servicio «ingest-worker» ya indexa la cola; evitar un segundo worker dentro del contenedor del API.
      INGEST_WORKER_AUTOSTART: "false"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/storage:/app/backend/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ingest-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql+psycopg://dndhelper:dndhelper@db:5432/dndhelper
      EMBEDDINGS_DEVICE: cpu
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/storage:/app/backend/storage
    entrypoint: ["/usr/local/bin/docker-entrypoint-worker.sh"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_UPSTREAM: backend:8000
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
